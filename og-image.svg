<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C1018"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <!-- Gold radial glow behind crescent -->
    <radialGradient id="glow" cx="50%" cy="46%" r="28%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle horizontal gold line gradient -->
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C9A84C" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#C9A84C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <!-- Starfield mask -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Starfield -->
  <g opacity="0.55" filter="url(#starGlow)">
    <circle cx="96"  cy="76"  r="1.4" fill="#C9A84C"/>
    <circle cx="264" cy="366" r="1.0" fill="#fff"/>
    <circle cx="456" cy="139" r="1.2" fill="#C9A84C"/>
    <circle cx="660" cy="490" r="0.9" fill="#fff"/>
    <circle cx="840" cy="52"  r="1.3" fill="#C9A84C"/>
    <circle cx="1008" cy="276" r="1.1" fill="#fff"/>
    <circle cx="1104" cy="428" r="1.2" fill="#C9A84C"/>
    <circle cx="180" cy="556" r="0.9" fill="#fff"/>
    <circle cx="720" cy="162" r="1.8" fill="#C9A84C" opacity="0.7"/>
    <circle cx="912" cy="330" r="1.0" fill="#C9A84C"/>
    <circle cx="336" cy="228" r="0.8" fill="#fff"/>
    <circle cx="1056" cy="94"  r="1.1" fill="#C9A84C"/>
    <circle cx="504" cy="572" r="0.9" fill="#fff"/>
    <circle cx="48"  cy="444" r="1.0" fill="#C9A84C"/>
    <circle cx="1152" cy="192" r="0.8" fill="#fff"/>
  </g>

  <!-- Gold radial glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Crescent moon — centred at (600, 210), scale ≈ 4× the app's 70px viewBox -->
  <g transform="translate(460, 70) scale(4)">
    <!-- Main crescent body -->
    <path d="M35 8 C20 8 10 20 10 35 C10 50 20 62 35 62 C28 55 24 46 24 35 C24 24 28 15 35 8Z"
          fill="#C9A84C" opacity="0.88"/>
    <!-- Small stars beside crescent -->
    <circle cx="48" cy="18" r="3"   fill="#E8CC84" opacity="0.6"/>
    <circle cx="54" cy="29" r="1.5" fill="#E8CC84" opacity="0.42"/>
    <circle cx="43" cy="31" r="1"   fill="#E8CC84" opacity="0.32"/>
  </g>

  <!-- Divider line -->
  <rect x="120" y="335" width="960" height="1" fill="url(#divider)"/>

  <!-- Bismillah — Arabic text -->
  <!-- Rendered as a path/text using a generic serif fallback; hosting environment will render with system Arabic fonts -->
  <text
    x="600" y="390"
    text-anchor="middle"
    font-family="'Scheherazade New','Traditional Arabic','Amiri','Arabic Typesetting','Noto Naskh Arabic',serif"
    font-size="52"
    fill="#E8CC84"
    opacity="0.92"
    direction="rtl"
  >بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</text>

  <!-- Decorative diamond divider -->
  <g transform="translate(600,448)" fill="#C9A84C" opacity="0.55">
    <rect x="-240" y="-0.5" width="218" height="1"/>
    <polygon points="0,-5 5,0 0,5 -5,0"/>
    <rect x="22"  y="-0.5" width="218" height="1"/>
  </g>

  <!-- App title -->
  <text
    x="600" y="502"
    text-anchor="middle"
    font-family="'Palatino Linotype','Palatino','Book Antiqua','Georgia','Times New Roman',serif"
    font-size="54"
    font-weight="400"
    letter-spacing="2"
    fill="#F0E6D0"
  >Nafi's Dua List</text>

  <!-- Subtitle / tagline -->
  <text
    x="600" y="548"
    text-anchor="middle"
    font-family="'Gill Sans','Optima','Segoe UI','Helvetica Neue','Arial',sans-serif"
    font-size="22"
    letter-spacing="3"
    fill="#A89470"
    opacity="0.85"
  >AUTHENTIC DUAS FROM QUR'AN &amp; SUNNAH</text>

  <!-- URL badge -->
  <rect x="388" y="572" width="424" height="34" rx="4" fill="#C9A84C" fill-opacity="0.10" stroke="#C9A84C" stroke-opacity="0.3" stroke-width="1"/>
  <text
    x="600" y="594"
    text-anchor="middle"
    font-family="'Gill Sans','Optima','Segoe UI','Helvetica Neue','Arial',sans-serif"
    font-size="16"
    letter-spacing="1"
    fill="#C9A84C"
    opacity="0.8"
  >nafikarim2001-blip.github.io/nafis-dua-list</text>

  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="590" rx="6"
        fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.22"/>
</svg>
